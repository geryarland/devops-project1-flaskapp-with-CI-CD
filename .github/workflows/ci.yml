name: CI Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Build Docker
        run: docker build -t devops-app .

      - name: Test App
        run: |
          docker run -d -p 5000:5000 devops-app
          sleep 5
          curl http://localhost:5000
